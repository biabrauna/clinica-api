# --- Banco H2 em memória (substitui MySQL nos testes) ---
spring.datasource.url=jdbc:h2:mem:clinica_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# --- Desabilita Flyway nos testes (DDL gerenciado pelo Hibernate) ---
spring.flyway.enabled=false

# --- JWT ---
jwt.secret=test-secret-key-for-testing-only-must-be-32-bytes!!
jwt.expiration-ms=3600000

# --- Reduz verbosidade ---
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
